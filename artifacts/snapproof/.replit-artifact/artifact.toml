kind = "web"
previewPath = "/"
title = "SnapProof AI"
version = "1.0.0"
id = "artifacts/snapproof"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22086

[services.development]
run = "pnpm --filter @workspace/snapproof run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/snapproof", "run", "build" ]
publicDir = "artifacts/snapproof/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22086"
BASE_PATH = "/"
