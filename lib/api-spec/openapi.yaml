        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [owner, admin, tech, viewer]
        organizationId:
          type: ["integer", "null"]
        organizationName:
          type: ["string", "null"]
        hasCompletedOnboarding:
          type: boolean
      required: [id, email, firstName, lastName, role, organizationId, organizationName, hasCompletedOnboarding]

